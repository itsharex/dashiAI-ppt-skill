let overviewOn=false;
let overviewDragFrom=null, overviewDidDrag=false, overviewDropIndex=null;
const OVERVIEW_ASPECT_W=16;
const OVERVIEW_ASPECT_H=9;
const ov=document.createElement('div');
ov.id='overview';
ov.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(250,250,248,.96);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:4vh 4vw';
document.body.appendChild(ov);

function getOverviewCards(grid){
  return Array.from(grid.querySelectorAll('[data-overview-card="true"]'));
}

function getOverviewDropSlot(e, grid){
  const cards = getOverviewCards(grid);
  if(!cards.length) return null;
  const gridRect = grid.getBoundingClientRect();
  const x = e.clientX;
  const y = e.clientY;
  const pad = 18;
  const zones = [];
  const first = cards[0].getBoundingClientRect();
  zones.push({
    index: 0,
    kind: 'vertical',
    x: first.left,
    y: first.top,
    h: first.height,
    hit: {left: gridRect.left, right: first.left + pad, top: first.top, bottom: first.bottom}
  });

  for(let i = 1; i < cards.length; i++){
    const prev = cards[i - 1].getBoundingClientRect();
    const next = cards[i].getBoundingClientRect();
    const sameRow = Math.abs(prev.top - next.top) < Math.min(prev.height, next.height) / 2;
    if(sameRow){
      const markerX = (prev.right + next.left) / 2;
      const top = Math.min(prev.top, next.top);
      const bottom = Math.max(prev.bottom, next.bottom);
      zones.push({
        index: i,
        kind: 'vertical',
        x: markerX,
        y: top,
        h: bottom - top,
        hit: {left: prev.right - pad / 2, right: next.left + pad / 2, top, bottom}
      });
    }else{
      const markerY = (prev.bottom + next.top) / 2;
      zones.push({
        index: i,
        kind: 'horizontal',
        x: gridRect.left,
        y: markerY,
        w: gridRect.width,
        hit: {left: gridRect.left, right: gridRect.right, top: prev.bottom - pad / 2, bottom: next.top + pad / 2}
      });
    }
  }

  const last = cards[cards.length - 1].getBoundingClientRect();
  zones.push({
    index: cards.length,
    kind: 'horizontal',
    x: gridRect.left,
    y: last.bottom + 18,
    w: gridRect.width,
    hit: {left: gridRect.left, right: gridRect.right, top: last.bottom, bottom: gridRect.bottom}
  });

  return zones.find(zone => x >= zone.hit.left && x <= zone.hit.right && y >= zone.hit.top && y <= zone.hit.bottom) || null;
}

function showOverviewDropMarker(marker, slot, grid){
  const gridRect = grid.getBoundingClientRect();
  marker.style.display = 'block';
  if(slot.kind === 'vertical'){
    marker.style.left = (slot.x - gridRect.left - 2) + 'px';
    marker.style.top = (slot.y - gridRect.top) + 'px';
    marker.style.width = '4px';
    marker.style.height = slot.h + 'px';
  }else{
    marker.style.left = '0';
    marker.style.top = (slot.y - gridRect.top - 2) + 'px';
    marker.style.width = '100%';
    marker.style.height = '4px';
  }
}

function hideOverviewDropMarker(marker){
  marker.style.display = 'none';
  overviewDropIndex = null;
}

function getOverviewSourceSize(){
  const width = Math.max(320, deckW || innerWidth);
  return {
    width,
    height: width * OVERVIEW_ASPECT_H / OVERVIEW_ASPECT_W,
  };
}

function fitOverviewThumbnails(){
  const {width, height} = getOverviewSourceSize();
  ov.querySelectorAll('[data-overview-thumb="true"]').forEach(wrap => {
    const clone = wrap.firstElementChild;
    if(!clone) return;
    wrap.style.aspectRatio = `${OVERVIEW_ASPECT_W} / ${OVERVIEW_ASPECT_H}`;
    clone.style.width = `${width}px`;
    clone.style.height = `${height}px`;
    const rect = wrap.getBoundingClientRect();
    if(!rect.width || !rect.height) return;
    const scale = Math.min(rect.width / width, rect.height / height);
    const x = (rect.width - width * scale) / 2;
    const y = (rect.height - height * scale) / 2;
    clone.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
  });
}

function scheduleOverviewFit(){
  requestAnimationFrame(fitOverviewThumbnails);
}
window.__scheduleOverviewFit = scheduleOverviewFit;
window.__fitOverviewThumbnails = fitOverviewThumbnails;

function scrollOverviewToCurrent(){
  requestAnimationFrame(() => {
    const card = ov.querySelector(`[data-overview-card="true"][data-index="${idx}"]`);
    card?.scrollIntoView({block:'center', inline:'nearest'});
  });
}

function buildOverview(){
  refreshSlideList();
  ov.innerHTML='';
  const sourceSize = getOverviewSourceSize();
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:2vh 1.6vw;max-width:90vw;margin:0 auto;padding-bottom:4vh;position:relative';
  const dropMarker=document.createElement('div');
  dropMarker.style.cssText='position:absolute;z-index:5;display:none;pointer-events:none;background:var(--focus-mark);border-radius:999px;box-shadow:0 0 0 4px rgba(0,0,0,.08)';
  slides.forEach((s,i)=>{
    const card=document.createElement('div');
    card.draggable=true;
    card.dataset.index=i;
    card.dataset.overviewCard='true';
    card.style.cssText='cursor:grab;overflow:hidden;position:relative;aspect-ratio:'+OVERVIEW_ASPECT_W+'/'+OVERVIEW_ASPECT_H+';outline:2px solid '+(i===idx?'var(--focus-mark)':'rgba(0,0,0,.12)')+';outline-offset:0;transition:outline-color .2s,opacity .2s,transform .2s;background:var(--paper)';
    card.onmouseenter=()=>card.style.outlineColor='rgba(0,0,0,.4)';
    card.onmouseleave=()=>card.style.outlineColor=i===idx?'var(--focus-mark)':'rgba(0,0,0,.12)';
    card.addEventListener('dragstart', e=>{
      overviewDragFrom=i;
      overviewDidDrag=true;
      card.style.opacity='.45';
      card.style.cursor='grabbing';
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain', String(i));
    });
    card.addEventListener('dragend', ()=>{
      overviewDragFrom=null;
      hideOverviewDropMarker(dropMarker);
      card.style.opacity='1';
      card.style.cursor='grab';
      card.style.transform='none';
    });
    const wrap=document.createElement('div');
    const isDark = slideUsesDarkChrome(s);
    wrap.dataset.overviewThumb='true';
    wrap.style.cssText='position:absolute;inset:0;width:100%;height:100%;aspect-ratio:'+OVERVIEW_ASPECT_W+'/'+OVERVIEW_ASPECT_H+';overflow:hidden;pointer-events:none;background:'+(isDark?'var(--ink)':'var(--paper)');
    const clone=s.cloneNode(true);
    clone.style.cssText='width:'+sourceSize.width+'px;height:'+sourceSize.height+'px;transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none';
    wrap.appendChild(clone);
    const label=document.createElement('div');
    /* ESC 索引卡 label */
    label.style.cssText='position:absolute;left:0;bottom:0;z-index:2;padding:6px 10px;font-family:var(--mono);font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:color-mix(in srgb,var(--paper) 84%,transparent);pointer-events:none';
    label.textContent=(i+1)+' / '+total;
    card.appendChild(wrap);
    card.appendChild(label);
    card.onclick=()=>{
      if(overviewDidDrag){overviewDidDrag=false;return;}
      toggleOverview();go(Number(card.dataset.index));
    };
    grid.appendChild(card);
  });
  grid.appendChild(dropMarker);
  grid.addEventListener('dragover', e=>{
    if(overviewDragFrom===null) return;
    const slot = getOverviewDropSlot(e, grid);
    if(!slot){
      hideOverviewDropMarker(dropMarker);
      return;
    }
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    overviewDropIndex = slot.index;
    showOverviewDropMarker(dropMarker, slot, grid);
  });
  grid.addEventListener('dragleave', e=>{
    if(!e.relatedTarget || !grid.contains(e.relatedTarget)) hideOverviewDropMarker(dropMarker);
  });
  grid.addEventListener('drop', e=>{
    const slot = getOverviewDropSlot(e, grid);
    if(overviewDragFrom===null || !slot) return;
    e.preventDefault();
    e.stopPropagation();
    overviewDidDrag=moveSlide(overviewDragFrom, slot.index);
    overviewDragFrom=null;
    overviewDropIndex=null;
    buildOverview();
  });
  ov.appendChild(grid);
  scheduleOverviewFit();
}

function toggleOverview(){
  overviewOn=!overviewOn;
  document.body.classList.toggle('overview-on', overviewOn);
  if(overviewOn){ov.style.display='block';buildOverview();fitOverviewThumbnails();scrollOverviewToCurrent();}
  else{ov.style.display='none';}
}

addEventListener('resize', () => {
  if(overviewOn) scheduleOverviewFit();
});

const DECK_NEXT_KEYS=new Set(['ArrowRight','PageDown','ArrowDown']);
const DECK_PREV_KEYS=new Set(['ArrowLeft','PageUp','ArrowUp']);


function handleDeckKeyNavigation(e,{allowSpace=true}={}){
  if(e.key==='Escape'){e.preventDefault();toggleOverview();return;}
  if(e.key && e.key.toLowerCase()==='b' && !e.metaKey && !e.ctrlKey && !e.altKey){
    e.preventDefault();
    window.__setLowPowerMode(!window.__lowPowerMode);
    return;
  }
  if(overviewOn)return;
  if(DECK_NEXT_KEYS.has(e.key)||(allowSpace&&e.key===' ')){
    e.preventDefault();
    if(window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+1);
    return;
  }
  if(DECK_PREV_KEYS.has(e.key)){e.preventDefault();go(idx-1);return;}
  if(e.key==='Home'){e.preventDefault();go(0);return;}
  if(e.key==='End'){e.preventDefault();go(total-1);}
}
window.__handleDeckKeyNavigation=handleDeckKeyNavigation;

addEventListener('keydown',e=>{
  if(isDeckTypingTarget(e.target)) return;
  handleDeckKeyNavigation(e);
});

function isDeckTypingTarget(target){
  return !!target?.closest?.('input,textarea,select,[contenteditable="true"],[contenteditable="plaintext-only"],[role="textbox"]');
}

let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{
  const dx=(e.changedTouches[0].clientX-tx);
  const dy=(e.changedTouches[0].clientY-ty);
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    if(dx<0 && window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+(dx<0?1:-1));
  }
},{passive:true});

const initialSlideParam = new URLSearchParams(location.search).get('slide');
const storedSlide = readStoredSlideIndex();
const initialSlide = initialSlideParam ? Number(initialSlideParam) - 1 : (storedSlide ?? 0);
layoutDeck();
go(Number.isFinite(initialSlide) ? initialSlide : 0, {animate:false});

  };
  window.__getPreviewState = () => ({...state});

  const count = document.getElementById('preview-slide-count');
  refreshDeckSlides();
  fillThemeSelect();
  applyTheme(state.theme);
  syncAnimationControl();
  applyStoredSlideControls();
  renderShaderControl();
  renderChartControl();
  renderPropControls();

  function readSaved(){
    try {
      return JSON.parse(localStorage.getItem(window.__previewStoreKey?.() || STORE) || '{}');
    } catch {
      return {};
    }
  }

  function writeSaved(){
    localStorage.setItem(window.__previewStoreKey?.() || STORE, JSON.stringify(state));
  }

  function refreshDeckSlides(){
    deckSlides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck .slide:not([hidden])')];
    if(count) count.textContent = `${deckSlides.length} slides`;
  }

  function pickTheme(value){
    return options.themes?.[value] ? value : (document.documentElement.dataset.theme || 'dark');
  }

  function fillThemeSelect(){
    const select = document.getElementById('preview-theme');
    if(!select) return;
    select.innerHTML = '';
    Object.entries(options.themes || {dark:{label:'深色背景'}, light:{label:'浅色背景'}}).forEach(([key, item]) => {
      const option = document.createElement('option');
      option.value = key;
      option.textContent = item.label || key;
      select.appendChild(option);
    });
    select.value = state.theme;
  }

  function applyTheme(key){
    state.theme = pickTheme(key);
    document.documentElement.dataset.theme = state.theme;
    const select = document.getElementById('preview-theme');
    if(select) select.value = state.theme;
    window.__syncSlideTone?.();
    window.__refreshThemeAwareUnicornScenes?.();
    dispatchEvent(new CustomEvent('preview-theme-change', {detail: {theme: state.theme}}));
  }

  document.getElementById('preview-theme')?.addEventListener('change', event => {
    applyTheme(event.target.value);
    writeSaved();
  });

  shaderSelect?.addEventListener('change', () => {
    const frame = getCurrentShaderFrame();
    if(!frame) return;
    const option = parseShaderOptions(frame).find(item => item.key === shaderSelect.value);
    if(option) applyShaderBackdrop(frame, option);
  });

  chartSelect?.addEventListener('change', () => {
    const frame = getCurrentChartFrame();
    if(!frame) return;
    const option = parseChartOptions(frame).find(item => item.key === chartSelect.value);
    if(option) applyChart(frame, option);
  });

  animationSelect?.addEventListener('change', () => {
    window.__setEntryAnimationEnabled?.(animationSelect.value !== 'off');
  });
  transitionSelect?.addEventListener('change', () => {
    state.pageTransition = transitionSelect.value || 'none';
    window.__setPageTransition?.(state.pageTransition);
    transitionSelect.blur();
    writeSaved();
  });

  addEventListener('swiss-slide-change', refreshSlideControls);
  addEventListener('swiss-slide-reorder', refreshSlideControls);
  addEventListener('swiss-entry-animation-change', syncAnimationControl);

  function refreshSlideControls(){
    refreshDeckSlides();
    renderShaderControl();
    renderChartControl();
    renderPropControls();
  }

  function syncAnimationControl(){
    if(animationSelect) animationSelect.value = window.__entryAnimationEnabled === false ? 'off' : 'on';
    if(transitionSelect) transitionSelect.value = state.pageTransition || 'none';
    window.__setPageTransition?.(state.pageTransition || 'none');
  }

  function applyStoredSlideControls(){
    const vmState = viewModel?.getState?.() || {};
    deckSlides.forEach(slide => {
      const slideId = slide.dataset.vmSlideId;
      const shaderKey = vmState.shader?.[slideId];
      const shaderFrame = slide.querySelector('[data-shader-backdrop="true"]');
      if(shaderKey && shaderFrame){
        const option = parseShaderOptions(shaderFrame).find(item => item.key === shaderKey);
        if(option) applyShaderBackdrop(shaderFrame, option, {persist:false});
      }
      const chartKey = vmState.chart?.[slideId];
      const chartFrame = slide.querySelector('[data-chart-switch="true"]');
      if(chartKey && chartFrame){
        const option = parseChartOptions(chartFrame).find(item => item.key === chartKey);
        if(option) applyChart(chartFrame, option, {persist:false});
      }
      applyPropValues(slide, getSlidePropValues(slide, vmState), {persist:false});
    });
  }

  function getCurrentShaderFrame(){
    return getCurrentSlide()?.querySelector('[data-shader-backdrop="true"]') || null;
  }

  function parseShaderOptions(frame){
    try {
      return JSON.parse(frame?.dataset.shaderOptions || '[]') || [];
    } catch {
      return [];
    }
  }

  function renderShaderControl(){
    if(!shaderField || !shaderSelect) return;
    const frame = getCurrentShaderFrame();
    const items = parseShaderOptions(frame);
    if(!frame || !items.length){
      shaderField.classList.add('is-hidden');
      shaderSelect.innerHTML = '';
      return;
    }
    shaderField.classList.remove('is-hidden');
    shaderSelect.innerHTML = '';
    items.forEach(item => {
      const option = document.createElement('option');
      option.value = item.key;
      option.textContent = item.label || item.key;
      shaderSelect.appendChild(option);
    });
    const current = frame.dataset.shaderCurrent;
    shaderSelect.value = items.some(item => item.key === current) ? current : items[0].key;
    shaderSelect.disabled = items.length <= 1;
  }

  function applyShaderBackdrop(frame, option, opts = {}){
    window.__resetUnicornSceneFrame?.(frame);
    frame.dataset.shaderCurrent = option.key;
    frame.classList.add('bt-unicorn-frame');
    frame.dataset.unicornJsonFilePath = option.jsonFilePath || '';
    frame.dataset.unicornScale = option.scale || 1;
    frame.dataset.unicornDpi = option.dpi || 1.5;
    frame.dataset.unicornSdkUrl = option.sdkUrl || '';
    const scene = document.createElement('div');
    scene.className = 'bt-unicorn-scene';
    frame.replaceChildren(scene);
    window.__syncActiveEffects?.();
    window.__initUnicornScenes?.(frame);
    if(opts.persist !== false) viewModel?.setShader?.(currentSlideId(), option.key);
  }

  function getCurrentChartFrame(){
    return getCurrentSlide()?.querySelector('[data-chart-switch="true"]') || null;
  }

  function parseChartOptions(frame){
    try {
      return JSON.parse(frame?.dataset.chartOptions || '[]') || [];
    } catch {
      return [];
    }
  }

  function renderChartControl(){
    if(!chartField || !chartSelect) return;
    const frame = getCurrentChartFrame();
    const items = parseChartOptions(frame);
    if(!frame || !items.length){
      chartField.classList.add('is-hidden');
      chartSelect.innerHTML = '';
      return;
    }
    chartField.classList.remove('is-hidden');
    chartSelect.innerHTML = '';
    items.forEach(item => {
      const option = document.createElement('option');
      option.value = item.key;
      option.textContent = item.label || item.key;
      chartSelect.appendChild(option);
    });
    const current = frame.dataset.chartCurrent;
    chartSelect.value = items.some(item => item.key === current) ? current : items[0].key;
    chartSelect.disabled = items.length <= 1;
  }

  function applyChart(frame, option, opts = {}){
    frame.dataset.chartCurrent = option.key;
    frame.replaceChildren(renderChartOption(option));
    if(opts.persist !== false) viewModel?.setChart?.(currentSlideId(), option.key);
  }

  function getCurrentPropRoot(){
    return getCurrentSlide()?.querySelector('[data-prop-controls]') || null;
  }

  function parsePropControls(root){
    try {
      return JSON.parse(root?.dataset.propControls || '[]') || [];
    } catch {
      return [];
    }
  }

  function parsePropDefaults(root){
    try {
      return JSON.parse(root?.dataset.propDefaults || '{}') || {};
    } catch {
      return {};
    }
  }

  function getSlidePropValues(slide, vmState = viewModel?.getState?.() || {}){
    const root = slide?.querySelector('[data-prop-controls]');
    if(!root) return {};
    const controls = parsePropControls(root);
    const defaults = parsePropDefaults(root);
    const savedProps = vmState.props?.[slide.dataset.vmSlideId] || {};
    const values = {...defaults, ...savedProps};
    controls.forEach(control => {
      values[control.key] = coercePropValue(control, values[control.key]);
    });
    return values;
  }

  function renderPropControls(){
    if(!propsField || !propsPanel) return;
    const root = getCurrentPropRoot();
    const controls = parsePropControls(root);
    if(!root || !controls.length){
      propsField.classList.add('is-hidden');
      propsPanel.innerHTML = '';
      return;
    }
    const slide = getCurrentSlide();
    const values = getSlidePropValues(slide);
    propsField.classList.remove('is-hidden');
    propsPanel.innerHTML = '';
    controls.forEach(control => {
      const row = document.createElement('div');
      row.className = 'preview-prop-row';
      const label = document.createElement('span');
      label.textContent = control.label || control.key;
      row.appendChild(label);
      if(control.type === 'toggle'){
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = !!values[control.key];
        input.addEventListener('change', () => updateCurrentProp(control, input.checked));
        row.appendChild(input);
      } else if(control.type === 'select'){
        const select = document.createElement('select');
        normalizePropOptions(control.options).forEach(item => {
          const option = document.createElement('option');
          option.value = item.value;
          option.textContent = item.label;
          select.appendChild(option);
        });
        select.value = String(values[control.key] ?? '');
        select.addEventListener('change', () => updateCurrentProp(control, select.value));
        row.appendChild(select);
      } else {
        const output = document.createElement('output');
        output.textContent = values[control.key];
        row.appendChild(output);
        const input = document.createElement('input');
        input.type = 'range';
        input.min = control.min ?? 0;
        input.max = control.max ?? 10;
        input.step = control.step ?? 1;
        input.value = values[control.key];
        input.addEventListener('input', () => {
          output.textContent = input.value;
          updateCurrentProp(control, Number(input.value));
        });
        row.appendChild(input);
      }
      propsPanel.appendChild(row);
    });
    applyPropValues(slide, values, {persist:false});
  }

  function updateCurrentProp(control, value){
    const slide = getCurrentSlide();
    if(!slide) return;
    const values = getSlidePropValues(slide);
    values[control.key] = coercePropValue(control, value);
    applyPropValues(slide, values);
  }

  function normalizePropOptions(options){
    return (options || []).map(item => Array.isArray(item)
      ? {value:String(item[0]), label:String(item[1] ?? item[0])}
      : {value:String(item), label:String(item)});
  }

  function coercePropValue(control, value){
    if(control.type === 'toggle') return value === true || value === 'true' || value === 1 || value === '1';
    if(control.type === 'range') return Number.isFinite(Number(value)) ? Number(value) : Number(control.min ?? 0);
    return value == null ? '' : String(value);
  }

  function applyPropValues(slide, values, opts = {}){
    if(!slide) return;
    const root = slide.querySelector('[data-prop-controls]');
    if(!root) return;
    const next = {...parsePropDefaults(root), ...(values || {})};
    Object.entries(next).forEach(([key, value]) => {
      const cssValue = key === 'imgCount' ? Math.max(1, Number(value) || 0) : value;
      root.style.setProperty(`--ai-${toKebab(key)}`, cssValue);
      slide.style.setProperty(`--ai-${toKebab(key)}`, cssValue);
      root.setAttribute(`data-ai-${toKebab(key)}`, String(value));
      slide.setAttribute(`data-ai-${toKebab(key)}`, String(value));
    });
    root.querySelectorAll('[data-ai-toggle],[data-ai-count],[data-ai-show-when]').forEach(el => {
      let hidden = false;
      if(el.dataset.aiToggle) hidden = hidden || !truthy(next[el.dataset.aiToggle]);
      if(el.dataset.aiCount){
        const max = Number(next[el.dataset.aiCount]);
        const index = Number(el.dataset.aiIndex || 0);
        hidden = hidden || (Number.isFinite(max) && index >= max);
      }
      if(el.dataset.aiShowWhen) hidden = hidden || !matchesPropCondition(el.dataset.aiShowWhen, next);
      el.hidden = hidden;
      if(el.dataset.aiOriginalDisplay === undefined) el.dataset.aiOriginalDisplay = el.style.display || '';
      el.style.display = hidden ? 'none' : el.dataset.aiOriginalDisplay;
    });
    const labelType = next.labelType || 'number';
    root.querySelectorAll('[data-ai-badge]').forEach(el => {
      const text = labelType === 'symbol'
        ? el.dataset.aiBadgeSymbol
        : labelType === 'keyword'
          ? el.dataset.aiBadgeKeyword
          : el.dataset.aiBadgeNumber;
      el.textContent = text || '';
    });
    root.querySelectorAll('[data-ai-focus-index]').forEach(el => {
      const active = truthy(next.focus) && Number(el.dataset.aiFocusIndex) === Number(next.focusIndex);
      el.classList.toggle('is-ai-focus-item', active);
    });
    root.querySelectorAll('.ai-donut[data-ai-segments]').forEach(el => updateAiDonut(el, next));
    if(opts.persist !== false) viewModel?.setProps?.(slide.dataset.vmSlideId, next);
  }

  function matchesPropCondition(condition, values){
    return String(condition || '').split(',').some(part => {
      const [key, ...rest] = part.split(':');
      return String(values[key]) === rest.join(':');
    });
  }

  function updateAiDonut(el, values){
    try {
      const segments = JSON.parse(el.dataset.aiSegments || '[]').slice(0, Number(values.segCount) || 0);
      const total = segments.reduce((sum, item) => sum + Number(item.pct || 0), 0) || 1;
      let cursor = 0;
      const stops = segments.map(item => {
        const start = cursor;
        cursor += (Number(item.pct || 0) / total) * 100;
        return `${item.color} ${start}% ${cursor}%`;
      });
      el.style.background = `conic-gradient(${stops.join(',')})`;
    } catch {}
  }

  function truthy(value){
    return value === true || value === 'true' || value === 1 || value === '1';
  }

  function toKebab(value){
    return String(value).replace(/[A-Z]/g, match => `-${match.toLowerCase()}`);
  }

  function renderChartOption(option){
    const fragment = document.createDocumentFragment();
    const title = document.createElement('div');
    title.className = 'chart-title';
    title.textContent = option.title || option.label || '';
    fragment.appendChild(title);
    const rows = normalizeChartRows(option.rows);
    if(option.type === 'line') fragment.appendChild(renderLineChart(rows));
    else if(option.type === 'cards') fragment.appendChild(renderMetricCards(rows));
    else fragment.appendChild(renderMiniBars(rows));
    return fragment;
  }

  function normalizeChartRows(rows){
    return (rows || []).map(row => Array.isArray(row)
      ? {label: row[0], value: Number(row[1]) || 0, tone: row[2], display: row[3]}
      : {label: row.label, value: Number(row.value) || 0, tone: row.tone, display: row.display});
  }

  function renderMiniBars(rows){
    const chart = document.createElement('div');
    chart.className = 'chart-bars';
    const max = rows.every(row => row.value <= 100) ? 100 : Math.max(1, ...rows.map(row => row.value));
    rows.forEach(row => {
      const item = document.createElement('div');
      item.className = `chart-row ${row.tone || ''}`.trim();
      item.innerHTML = '<div class="chart-label"></div><div class="chart-track"><span></span></div><div class="chart-value"></div>';
      item.querySelector('.chart-label').textContent = row.label;
      item.querySelector('.chart-track span').style.width = `${(row.value / max) * 100}%`;
      item.querySelector('.chart-value').textContent = row.display || `${row.value}%`;
      chart.appendChild(item);
    });
    return chart;
  }

  function renderLineChart(rows){
    const chart = document.createElement('div');
    chart.className = 'chart-line';
    const max = Math.max(100, ...rows.map(row => row.value));
    const points = rows.map((row, index) => {
      const x = rows.length > 1 ? (index / (rows.length - 1)) * 100 : 50;
      const y = 92 - (row.value / max) * 78;
      return {x, y, row};
    });
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    line.setAttribute('points', points.map(point => `${point.x},${point.y}`).join(' '));
    svg.appendChild(line);
    points.forEach(point => {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', point.x);
      circle.setAttribute('cy', point.y);
      circle.setAttribute('r', point.row.tone === 'focus' ? 3.2 : 2.3);
      svg.appendChild(circle);
      const tick = document.createElement('div');
      tick.className = 'chart-tick';
      tick.style.left = `${point.x}%`;
      tick.textContent = point.row.label;
      chart.appendChild(tick);
    });
    chart.appendChild(svg);
    return chart;
  }

  function renderMetricCards(rows){
    const chart = document.createElement('div');
    chart.className = 'chart-cards';
    rows.forEach(row => {
      const card = document.createElement('div');
      card.className = `chart-card ${row.tone || ''}`.trim();
      card.innerHTML = '<div class="chart-card-value"></div><div class="chart-card-label"></div>';
      card.querySelector('.chart-card-value').textContent = row.display || `${row.value}%`;
      card.querySelector('.chart-card-label').textContent = row.label;
      chart.appendChild(card);
    });
    return chart;
  }

  function setOpen(open){
    document.body.classList.toggle('preview-panel-open', open);
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    if(!open) window.__closeIconPicker?.();
    requestAnimationFrame(() => {
      window.__layoutDeck?.();
      window.__fitOverviewThumbnails?.();
    });
  }

  panel.addEventListener('mousedown', e => e.stopPropagation());
  toggle.addEventListener('mousedown', e => e.stopPropagation());
  toggle.addEventListener('click', () => setOpen(!document.body.classList.contains('preview-panel-open')));
  close?.addEventListener('click', () => setOpen(false));
  document.getElementById('preview-replay')?.addEventListener('click', () => window.__playSlide?.(window.__currentSlideIndex || 0));
  document.getElementById('preview-export')?.addEventListener('click', () => window.__exportDeckHtml?.());
  document.getElementById('preview-export-pdf')?.addEventListener('click', () => window.__exportDeckPdf?.());
  document.getElementById('preview-export-pptx')?.addEventListener('click', () => window.__exportDeckPptx?.());
  document.getElementById('preview-reset')?.addEventListener('click', () => {
    localStorage.removeItem(STORE);
    Object.keys(localStorage).filter(key => key.startsWith(`${STORE}:`)).forEach(key => localStorage.removeItem(key));
    localStorage.removeItem('guizang-ppt-view-model');
    Object.keys(localStorage).filter(key => key.startsWith('guizang-ppt-current-slide:')).forEach(key => localStorage.removeItem(key));
    location.reload();
  });

  function currentSlideId(){
    return getCurrentSlide()?.dataset.vmSlideId || '';
  }

  function getCurrentSlide(){
    const index = window.__currentSlideIndex || 0;
    return deckSlides[index] || null;
  }
})();
</script>
<script>
/* =============== Icon Slot Editor =============== */
(function(){
  const deck = document.getElementById('deck');
  const stateEl = document.getElementById('embedded-icon-state');
  if(!deck || !stateEl) return;

  const iconState = readIconState();
  const DEFAULT_ICONS = [
    'lightbulb-flash-line','mail-send-line','map-pin-2-line','bar-chart-box-line','layout-grid-line','team-line',
    'sparkling-2-line','rocket-2-line','flag-2-line','focus-3-line','calendar-event-line','megaphone-line',
    'line-chart-line','pie-chart-2-line','bubble-chart-line','database-2-line','stack-line','node-tree',
    'service-line','hand-coin-line','shake-hands-line','presentation-line','briefcase-4-line','building-4-line',
    'compass-3-line','route-line','radar-line','global-line','seedling-line','fire-line',
    'shield-check-line','award-line','trophy-line','medal-line','verified-badge-line','star-smile-line',
    'settings-3-line','tools-line','box-3-line','archive-stack-line','git-branch-line','mind-map',
    'image-line','movie-2-line','brush-3-line','palette-line','magic-line','pencil-ruler-2-line',
  ];
  let icons = [...DEFAULT_ICONS];
  window.__iconPickerIcons = icons;
  let activeSlot = null;

  const panel = document.createElement('aside');
  panel.id = 'icon-picker-panel';
  panel.hidden = true;
  panel.innerHTML = `
    <div class="icon-picker-head">
      <strong>RemixIcon</strong>
      <button type="button" data-icon-close>关闭</button>
    </div>
    <input class="icon-picker-input" type="text" placeholder="搜索或输入 ri-lightbulb-flash-line" aria-label="RemixIcon 名称">
    <div class="icon-picker-grid"></div>
    <div class="icon-picker-count" data-icon-count></div>
  `;
  document.body.appendChild(panel);

  const input = panel.querySelector('.icon-picker-input');
  const grid = panel.querySelector('.icon-picker-grid');
  const count = panel.querySelector('[data-icon-count]');
  const head = panel.querySelector('.icon-picker-head');
  let dragState = null;

  window.__flushIconState = writeIconState;
  window.__initDeckIcons = initIcons;
  window.__closeIconPicker = closePanel;
  initIcons(deck);
  loadIconList();

  deck.addEventListener('click', e => {
    const slot = e.target.closest('[data-icon-slot]');
    if(!slot) return;
    if(!isPreviewPanelOpen()) return;
    e.preventDefault();
    e.stopPropagation();
    openPanel(slot);
  }, true);

  deck.addEventListener('keydown', e => {
    const slot = e.target.closest('[data-icon-slot]');
    if(!slot || (e.key !== 'Enter' && e.key !== ' ')) return;
    if(!isPreviewPanelOpen()) return;
    e.preventDefault();
    e.stopPropagation();
    openPanel(slot);
  }, true);

  panel.addEventListener('mousedown', e => e.stopPropagation());
  panel.addEventListener('pointerdown', e => e.stopPropagation());
  panel.addEventListener('click', e => {
    e.stopPropagation();
    const option = e.target.closest('[data-icon-option]');
    if(option) chooseIcon(option.dataset.iconOption);
    if(e.target.closest('[data-icon-close]')) closePanel();
  });
  panel.addEventListener('keydown', e => {
    e.stopPropagation();
    if(e.key === 'Escape') closePanel();
    if(e.key === 'Enter' && e.target === input) chooseIcon(input.value);
  });
  input.addEventListener('input', () => renderGrid(input.value));
  addEventListener('mousedown', e => {
    if(panel.hidden || panel.contains(e.target) || e.target.closest('[data-icon-slot]')) return;
    closePanel();
  });
  head.addEventListener('pointerdown', e => {
    if(e.button !== 0 || e.target.closest('button')) return;
    const rect = panel.getBoundingClientRect();
    dragState = {
      pointerId: e.pointerId,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
    };
    panel.classList.add('is-dragging');
    head.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  head.addEventListener('pointermove', e => {
    if(!dragState || dragState.pointerId !== e.pointerId) return;
    setPanelPosition(e.clientX - dragState.offsetX, e.clientY - dragState.offsetY);
  });
  head.addEventListener('pointerup', finishDrag);
  head.addEventListener('pointercancel', finishDrag);

  function initIcons(scope = deck){
    const root = scope instanceof Element ? scope : deck;
    const slots = [
      ...(root.matches?.('[data-icon-slot]') ? [root] : []),
      ...root.querySelectorAll('[data-icon-slot]'),
    ];
    slots.forEach(slot => {
      const saved = iconState[getSlotId(slot)];
      if(saved) applyIcon(slot, saved);
    });
  }

  function isPreviewPanelOpen(){
    return document.body.classList.contains('preview-panel-open');
  }

  function openPanel(slot){
    activeSlot?.classList.remove('is-active');
    activeSlot = slot;
    activeSlot.classList.add('is-active');
    input.value = '';
    input.placeholder = slot.dataset.remixIcon ? `当前 ri-${slot.dataset.remixIcon} · 搜索图标` : '搜索或输入 ri-lightbulb-flash-line';
    renderGrid('');
    panel.hidden = false;
    keepPanelInViewport();
    requestAnimationFrame(() => input.focus());
  }

  function closePanel(){
    panel.hidden = true;
    activeSlot?.classList.remove('is-active');
    activeSlot = null;
  }

  function chooseIcon(value){
    if(!activeSlot) return;
    const name = normalizeIconName(value);
    if(!name) return;
    applyIcon(activeSlot, name);
    iconState[getSlotId(activeSlot)] = name;
    writeIconState();
    input.value = '';
    input.placeholder = `当前 ri-${name} · 搜索图标`;
    renderGrid('');
  }

  function applyIcon(slot, name){
    const normalized = normalizeIconName(name);
    if(!normalized) return;
    slot.dataset.remixIcon = normalized;
    slot.setAttribute('aria-label', `替换图标: ${normalized}`);
    let icon = slot.querySelector('i');
    if(!icon){
      icon = document.createElement('i');
      icon.setAttribute('aria-hidden', 'true');
      slot.appendChild(icon);
    }
    icon.className = `ri-${normalized}`;
  }

  function renderGrid(filter){
    const query = normalizeIconName(filter).toLowerCase();
    const current = activeSlot?.dataset.remixIcon;
    const matches = icons.filter(name => !query || name.includes(query));
    grid.innerHTML = '';
    matches.forEach(name => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `icon-picker-option ${name === current ? 'is-selected' : ''}`.trim();
      button.dataset.iconOption = name;
      button.title = `ri-${name}`;
      button.innerHTML = `<i class="ri-${name}" aria-hidden="true"></i>`;
      grid.appendChild(button);
    });
    count.textContent = query
      ? `匹配 ${matches.length} 个图标`
      : `共 ${icons.length} 个 RemixIcon 图标`;
  }

  function loadIconList(){
    const names = Array.isArray(window.__REMIX_ICON_NAMES__) ? window.__REMIX_ICON_NAMES__ : [];
    if(!names.length) return;
    const seen = new Set();
    icons = [...DEFAULT_ICONS, ...names]
      .map(normalizeIconName)
      .filter(name => {
        if(!name || seen.has(name)) return false;
        seen.add(name);
        return true;
      });
    window.__iconPickerIcons = icons;
  }

  function getSlotId(slot){
    return slot.dataset.iconSlot;
  }

  function finishDrag(e){
    if(!dragState || dragState.pointerId !== e.pointerId) return;
    dragState = null;
    panel.classList.remove('is-dragging');
  }

  function setPanelPosition(left, top){
    const margin = 12;
    const rect = panel.getBoundingClientRect();
    const maxLeft = innerWidth - rect.width - margin;
    const maxTop = innerHeight - rect.height - margin;
    const nextLeft = Math.min(Math.max(margin, left), Math.max(margin, maxLeft));
    const nextTop = Math.min(Math.max(margin, top), Math.max(margin, maxTop));
    panel.style.left = `${nextLeft}px`;
    panel.style.top = `${nextTop}px`;
    panel.style.right = 'auto';
    panel.style.transform = 'none';
  }

  function keepPanelInViewport(){
    if(!panel.style.left || !panel.style.top) return;
    const rect = panel.getBoundingClientRect();
    setPanelPosition(rect.left, rect.top);
  }

  function normalizeIconName(value){
    return String(value || '').trim().replace(/^ri-/, '').replace(/\s+/g, '').replace(/[^a-z0-9-]/gi, '');
  }

  function readIconState(){
    try {
      return JSON.parse(stateEl.textContent || '{}') || {};
    } catch {
      return {};
    }
  }

  function writeIconState(){
    stateEl.textContent = JSON.stringify(iconState).replace(/</g, '\\u003c');
    window.__deckViewModel?.setIconState?.(iconState);
  }
})();
</script>
<script>
/* =============== Media Slot Editor + Static HTML Export =============== */
(function(){
  const deck = document.getElementById('deck');
  const stateEl = document.getElementById('embedded-media-state') || document.getElementById('embedded-image-state');
  if(!deck || !stateEl) return;

  const mediaState = readMediaState();
  const MEDIA_SLOT_SELECTOR = '.bt-image-slot,.frame-img[data-media-slot],.xhs3-media[data-media-slot]';
  const IMAGE_FILE_RE = /\.(png|jpe?g|gif|webp|svg|avif|bmp|tiff?)(\?|#|$)/i;
  const VIDEO_FILE_RE = /\.(mp4|webm|mov|m4v|ogv|ogg|avi|mkv)(\?|#|$)/i;
  const COMMON_MEDIA_RATIOS = [[1,1],[4,5],[3,4],[2,3],[9,16],[4,3],[3,2],[16,10],[16,9],[21,9]];
  window.__deckImageState = mediaState;
  window.__deckMediaState = mediaState;
  window.__syncMediaSlotRatios = updateMediaSlotRatios;

  const picker = document.createElement('input');
  picker.id = 'media-picker-input';
  picker.type = 'file';
  picker.accept = 'image/*,video/*,.mp4,.webm,.mov,.m4v,.ogv,.ogg,.avi,.mkv';
  picker.hidden = true;
  document.body.appendChild(picker);

  let activeSlot = null;

  initSlots();
  applyAllMedia();
  requestAnimationFrame(updateMediaSlotRatios);
  addEventListener('resize', updateMediaSlotRatios);
  addEventListener('swiss-slide-change', updateMediaSlotRatios);
  addEventListener('swiss-slide-reorder', updateMediaSlotRatios);

  deck.addEventListener('click', e => {
    if(e.target.closest('[contenteditable="true"]')) return;
    const slot = e.target.closest(MEDIA_SLOT_SELECTOR);
    if(!slot) return;
    e.preventDefault();
    e.stopPropagation();
    activeSlot = slot;
    picker.value = '';
    picker.click();
  });

  deck.addEventListener('keydown', e => {
    if(e.target.closest('[contenteditable="true"]')) return;
    const slot = e.target.closest(MEDIA_SLOT_SELECTOR);
    if(!slot || (e.key !== 'Enter' && e.key !== ' ')) return;
    e.preventDefault();
    activeSlot = slot;
    picker.value = '';
    picker.click();
  });

  picker.addEventListener('change', () => {
    const file = picker.files?.[0];
    if(!file || !activeSlot) return;
    readMediaFile(file, activeSlot);
  });

  deck.addEventListener('dragenter', e => {
    const slot = e.target.closest(MEDIA_SLOT_SELECTOR);
    if(!slot) return;
    e.preventDefault();
    slot.classList.add('is-drag-over');
  });

  deck.addEventListener('dragover', e => {
    const slot = e.target.closest(MEDIA_SLOT_SELECTOR);
    if(!slot) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    slot.classList.add('is-drag-over');
  });

  deck.addEventListener('dragleave', e => {
    const slot = e.target.closest(MEDIA_SLOT_SELECTOR);
    if(!slot || slot.contains(e.relatedTarget)) return;
    slot.classList.remove('is-drag-over');
  });

  deck.addEventListener('drop', e => {
    const slot = e.target.closest(MEDIA_SLOT_SELECTOR);
    if(!slot) return;
    e.preventDefault();
    e.stopPropagation();
    slot.classList.remove('is-drag-over');
    const file = [...(e.dataTransfer?.files || [])].find(isMediaFile);
    if(file) readMediaFile(file, slot);
  });

  function readMediaFile(file, slot){
    const kind = getMediaKind(file);
    if(!kind) return;
    const reader = new FileReader();
    reader.onload = () => {
      const id = getSlotId(slot);
      mediaState[id] = {src: reader.result, name: file.name, type: file.type, kind};
      applyMedia(slot, mediaState[id]);
      writeMediaState();
    };
    reader.readAsDataURL(file);
  }

  function isMediaFile(file){
    return !!getMediaKind(file);
  }

  function getMediaKind(file){
    const type = file?.type || '';
    if(type.startsWith('image/')) return 'image';
    if(type.startsWith('video/')) return 'video';
    const name = file?.name || '';
    if(IMAGE_FILE_RE.test(name)) return 'image';
    if(VIDEO_FILE_RE.test(name)) return 'video';
    return '';
  }

  window.__exportDeckPdf = async function(){
    updateMediaSlotRatios();
    window.__syncDeckPageNumbers?.();
    window.__flushEditableTextState?.();
    window.__flushIconState?.();
    window.__syncDeckViewModelFromDom?.();
    document.body.classList.remove('preview-panel-open');
    window.__layoutDeck?.();
    window.__restoreEffectIframes?.(document);
    await window.__initUnicornScenes?.(document, {force:true});
    await waitForUnicornFrames(document, 6000);
    window.print();
    setTimeout(() => window.__syncActiveEffects?.(), 0);
  };

  window.__exportDeckPptx = async function(){
    const button = document.getElementById('preview-export-pptx');
    const buttonLabel = button?.textContent;
    let restoreState = null;
    try {
      if(button){
        button.disabled = true;
        button.textContent = '导出中...';
      }
      updateMediaSlotRatios();
      window.__syncDeckPageNumbers?.();
      window.__flushEditableTextState?.();
      window.__flushIconState?.();
      writeMediaState();
      window.__syncDeckViewModelFromDom?.();
      await Promise.all([
        loadExportScript('assets/vendor/pptxgen.bundle.js', () => window.PptxGenJS),
        loadExportScript('assets/vendor/html-to-image.js', () => window.htmlToImage),
      ]);

      const PptxGen = window.PptxGenJS;
      const pptx = new PptxGen();
      const PPT_W = 16;
      const PPT_H = 9;
      pptx.defineLayout({name: 'HTML_WIDE', width: PPT_W, height: PPT_H});
      pptx.layout = 'HTML_WIDE';
      pptx.author = 'Dashi PPT Skill';
      pptx.subject = 'Exported from HTML preview';
      pptx.title = document.title || 'Presentation';

      const overview = document.getElementById('overview');
      restoreState = {
        index: window.__currentSlideIndex || 0,
        panelOpen: document.body.classList.contains('preview-panel-open'),
        overviewOn: document.body.classList.contains('overview-on'),
        overviewDisplay: overview?.style.display || '',
      };

      document.body.classList.remove('preview-panel-open', 'overview-on');
      if(overview) overview.style.display = 'none';
      window.__layoutDeck?.();
      window.__restoreEffectIframes?.(document);
      await window.__initUnicornScenes?.(document, {force:true});
      await waitForUnicornFrames(document, 6000);

      const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck .slide:not([hidden])')];
      for(let i = 0; i < slides.length; i++){
        go(i, {animate:false});
        await nextFrame();
        await nextFrame();
        const slideEl = slides[i];
        window.__restoreEffectIframes?.(slideEl);
        await window.__initUnicornScenes?.(slideEl, {force:true});
        await waitForUnicornFrames(slideEl, 1800);

        document.body.classList.add('pptx-export-capturing');
        await nextFrame();
        const imageData = await captureSlideImage(slideEl, {
          cacheBust: true,
          skipFonts: true,
          pixelRatio: Math.min(2, Math.max(1.35, window.devicePixelRatio || 1.5)),
          backgroundColor: getCaptureBackground(slideEl),
        });
        document.body.classList.remove('pptx-export-capturing');

        const pptSlide = pptx.addSlide();
        pptSlide.addImage({data: imageData, x: 0, y: 0, w: PPT_W, h: PPT_H});
      }

      restorePptxExportState(restoreState);
      await pptx.writeFile({fileName: `${getDeckFileName()}.pptx`});
    } catch (error) {
      console.error('[export pptx]', error);
      alert('PPTX 导出失败，请在浏览器控制台查看错误。');
    } finally {
      document.body.classList.remove('pptx-export-capturing');
      restorePptxExportState(restoreState);
      if(button){
        button.disabled = false;
        button.textContent = buttonLabel;
      }
      window.__syncActiveEffects?.();
    }
  };

  window.__exportDeckHtml = function(){
    updateMediaSlotRatios();
    window.__syncDeckPageNumbers?.();
    window.__flushEditableTextState?.();
    window.__flushIconState?.();
    writeMediaState();
    window.__syncDeckViewModelFromDom?.();
    const blob = new Blob([buildCleanExportHtml()], {type: 'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'index.html';
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  function buildCleanExportHtml(){
    const clean = document.implementation.createHTMLDocument(document.title || 'Presentation');
    copyRootAttributes(clean.documentElement, document.documentElement);
    clean.head.replaceChildren();
    copyExportHead(clean);

    const body = clean.body;
    body.className = cleanBodyClass(document.body.className);
    body.classList.add('exported-html');
    body.style.cssText = document.body.style.cssText || '';

    const deckClone = deck.cloneNode(true);
    sanitizeDeckForExport(deckClone);
    body.appendChild(deckClone);
    appendExportRuntime(clean);

    return '<!DOCTYPE html>\n' + clean.documentElement.outerHTML;
  }

  function copyRootAttributes(target, source){
    [...source.attributes].forEach(attr => target.setAttribute(attr.name, attr.value));
    target.classList.remove('preview-panel-open', 'overview-on');
  }

  function copyExportHead(clean){
    [...document.head.children].forEach(node => {
      if(node.matches?.('script')) return;
      const copy = node.cloneNode(true);
      if(copy.tagName === 'STYLE') copy.textContent = cleanCssForExport(copy.textContent || '');
      clean.head.appendChild(copy);
    });
    const exportStyle = clean.createElement('style');
    exportStyle.textContent = `
body.exported-html #deck{z-index:10}
body.exported-html .bt-image-slot,
body.exported-html .frame-img,
body.exported-html .xhs3-media,
body.exported-html .remix-icon-slot{cursor:default}
body.exported-html .remix-icon-slot:focus-visible{outline:none}
`.trim();
    clean.head.appendChild(exportStyle);
  }

  function cleanCssForExport(css){
    return css
      .replace(/\/\*[\s\S]*?\*\//g, '')
      .split('}')
      .map(chunk => {
        const selector = chunk.split('{')[0] || '';
        return /#preview|\.preview|#overview|#nav|#hint|#icon-picker-panel|\.icon-picker|#image-picker-input|#media-picker-input|\.page-transition|pptx-export-capturing/.test(selector)
          ? ''
          : chunk + '}';
      })
      .join('\n')
      .replace(/\n{3,}/g, '\n\n')
      .trim();
  }

  function cleanBodyClass(value){
    return (value || '')
      .split(/\s+/)
      .filter(name => name && ![
        'preview-panel-open',
        'overview-on',
        'pptx-export-capturing',
      ].includes(name))
      .join(' ');
  }

  function sanitizeDeckForExport(deckClone){
    const visibleIds = new Set((window.__getVisibleSlides?.() || [...deck.querySelectorAll('.slide:not([hidden])')])
      .map(slide => slide.dataset.vmSlideId || slide.id || slide.dataset.layout)
      .filter(Boolean));

    [...deckClone.querySelectorAll('.slide')].forEach(slide => {
      const key = slide.dataset.vmSlideId || slide.id || slide.dataset.layout;
      if(visibleIds.size && key && !visibleIds.has(key)){
        slide.remove();
        return;
      }
      slide.hidden = false;
      slide.removeAttribute('aria-hidden');
    });

    const slides = [...deckClone.querySelectorAll('.slide')];
    slides.forEach((slide, index) => slide.classList.toggle('active', index === 0));

    deckClone.removeAttribute('style');
    deckClone.querySelectorAll('script,template').forEach(el => el.remove());
    deckClone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
    deckClone.querySelectorAll('.is-drag-over,.is-active').forEach(el => el.classList.remove('is-drag-over', 'is-active'));

    deckClone.querySelectorAll('*').forEach(el => {
      [
        'data-editable-id',
        'data-editable-skip',
        'data-sync-text',
        'data-media-slot',
        'data-image-slot',
        'data-media-kind',
        'data-remix-icon',
        'data-vm-slide-id',
        'data-slide-key',
        'data-anim',
        'data-animate',
        'data-chart-switch',
        'data-chart-options',
        'data-chart-current',
      ].forEach(name => el.removeAttribute(name));
      if(el.hasAttribute('role') && ['button', 'textbox'].includes(el.getAttribute('role'))) el.removeAttribute('role');
      el.removeAttribute('tabindex');
      if(el.getAttribute('aria-label') === '替换图片或视频' || el.getAttribute('aria-label') === '替换图标') el.removeAttribute('aria-label');
      if(el.getAttribute('title') === '点击或拖拽替换图片或视频') el.removeAttribute('title');
    });

    deckClone.querySelectorAll('[data-icon-slot]').forEach(icon => {
      icon.removeAttribute('data-icon-slot');
      if(icon.tagName !== 'BUTTON') return;
      const span = document.createElement('span');
      [...icon.attributes].forEach(attr => {
        if(attr.name !== 'type') span.setAttribute(attr.name, attr.value);
      });
      span.innerHTML = icon.innerHTML;
      icon.replaceWith(span);
    });

    deckClone.querySelectorAll('iframe[data-effect-src]').forEach(iframe => {
      if(!iframe.getAttribute('src') && iframe.dataset.effectSrc) iframe.setAttribute('src', iframe.dataset.effectSrc);
    });
    deckClone.querySelectorAll('.bt-unicorn-frame').forEach(frame => {
      frame.removeAttribute('data-unicorn-ready');
    });
    deckClone.querySelectorAll('.bt-unicorn-scene').forEach(scene => {
      scene.innerHTML = '';
      scene.removeAttribute('id');
    });
  }

  function appendExportRuntime(clean){
    const sceneMap = clean.createElement('script');
    sceneMap.id = 'unicorn-scene-json-map';
    sceneMap.type = 'application/json';
    sceneMap.textContent = document.getElementById('unicorn-scene-json-map')?.textContent || '{}';
    clean.body.appendChild(sceneMap);
    const script = clean.createElement('script');
    script.textContent = `(${cleanExportRuntime.toString()})();\n(${staticUnicornExportRuntime.toString()})();`;
    clean.body.appendChild(script);
  }

  function cleanExportRuntime(){
    const deck = document.getElementById('deck');
    const slides = [...deck.querySelectorAll('.slide')];
    let idx = 0;
    let deckW = innerWidth;
    function layout(){
      deckW = Math.max(320, innerWidth);
      document.documentElement.style.setProperty('--deck-w', deckW + 'px');
      deck.style.width = (slides.length * deckW) + 'px';
      deck.style.height = innerHeight + 'px';
      deck.style.transform = 'translateX(' + (-idx * deckW) + 'px)';
    }

    function go(next){
      idx = Math.max(0, Math.min(slides.length - 1, next));
      window.__currentSlideIndex = idx;
      slides.forEach((slide, index) => slide.classList.toggle('active', index === idx));
      layout();
      syncActiveMedia();
      dispatchEvent(new CustomEvent('swiss-slide-change', {detail: {index: idx, slide: slides[idx]}}));
    }

    function syncActiveMedia(){
      slides.forEach((slide, index) => {
        const active = index === idx && !document.hidden;
        slide.querySelectorAll('video').forEach(video => {
          if(active) video.play?.().catch(() => {});
          else video.pause?.();
        });
        slide.querySelectorAll('iframe').forEach(iframe => {
          if(!iframe.dataset.effectSrc) iframe.dataset.effectSrc = iframe.getAttribute('src') || '';
          if(active){
            if(!iframe.getAttribute('src') && iframe.dataset.effectSrc) iframe.setAttribute('src', iframe.dataset.effectSrc);
          } else if(iframe.getAttribute('src')){
            iframe.removeAttribute('src');
          }
        });
      });
    }

    addEventListener('resize', layout);
    addEventListener('visibilitychange', syncActiveMedia);
    addEventListener('keydown', event => {
      if(event.defaultPrevented || event.target?.closest?.('input,textarea,select')) return;
      if(['ArrowRight','PageDown',' '].includes(event.key)){ event.preventDefault(); go(idx + 1); }
      else if(['ArrowLeft','PageUp'].includes(event.key)){ event.preventDefault(); go(idx - 1); }
      else if(event.key === 'Home'){ event.preventDefault(); go(0); }
      else if(event.key === 'End'){ event.preventDefault(); go(slides.length - 1); }
    });
    deck.addEventListener('mousedown', event => {
      if(event.target.closest('button,input,textarea,select,a')) return;
      if(event.button === 0){ event.preventDefault(); go(idx + 1); }
      else if(event.button === 2){ event.preventDefault(); go(idx - 1); }
    });
    deck.addEventListener('contextmenu', event => event.preventDefault());

    layout();
    go(0);
  }

  function staticUnicornExportRuntime(){
    const DEFAULT_SDK_URL = 'https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.12/dist/unicornStudio.umd.js';
    let sdkPromise = null;

    window.__initUnicornScenes = initUnicornScenes;
    window.__resetUnicornSceneFrame = resetFrame;
    window.__syncUnicornSceneActivity = syncUnicornSceneActivity;
    window.__refreshThemeAwareUnicornScenes = refreshThemeAwareScenes;

    addEventListener('swiss-slide-change', e => {
      const { index, slide } = e.detail;
      syncUnicornSceneActivity(slide);
      setTimeout(() => {
        if((window.__currentSlideIndex || 0) === index) initUnicornScenes(slide);
      }, 80);
    });
    syncUnicornSceneActivity(getCurrentSlide());
    initUnicornScenes(getCurrentSlide());

    function initUnicornScenes(scope = getCurrentSlide(), options = {}){
      const root = scope instanceof Element ? scope : document;
      const selector = '.bt-unicorn-frame[data-unicorn-project-id],.bt-unicorn-frame[data-unicorn-json-file-path]';
      const frames = [
        ...(root.matches?.(selector) ? [root] : []),
        ...Array.from(root.querySelectorAll(selector)),
      ];
      const activeSlide = getCurrentSlide();
      const pending = frames.filter(frame => {
        if(frame.dataset.unicornReady || frame.closest('.bt-image-slot.has-user-image,.bt-image-slot.has-user-media')) return false;
        return options.force || activeSlide.contains(frame) || frame === activeSlide;
      });
      if(!pending.length) return Promise.resolve([]);
      const sdkUrl = pending[0].dataset.unicornSdkUrl || DEFAULT_SDK_URL;
      return loadSdk(sdkUrl).then(() => Promise.allSettled(pending.map(initFrame))).catch(error => {
        console.warn('[unicorn] failed to load scene runtime', error);
        return [];
      });
    }

    function getCurrentSlide(){
      const slides = document.querySelectorAll('#deck .slide');
      return slides[window.__currentSlideIndex || 0] || document;
    }

    function loadSdk(sdkUrl){
      if(window.UnicornStudio?.addScene) return Promise.resolve();
      if(sdkPromise) return sdkPromise;
      sdkPromise = new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${sdkUrl}"]`);
        const script = existing || document.createElement('script');
        script.addEventListener('load', resolve, {once:true});
        script.addEventListener('error', reject, {once:true});
        if(!existing){
          script.src = sdkUrl;
          script.async = true;
          document.head.appendChild(script);
        }
      }).then(() => {
        if(!window.UnicornStudio?.addScene) throw new Error('UnicornStudio.addScene not found');
      });
      return sdkPromise;
    }

    function initFrame(frame){
      const scene = frame.querySelector('.bt-unicorn-scene');
      if(!scene || frame.dataset.unicornReady) return;
      const elementId = scene.id || `unicorn-${Math.random().toString(36).slice(2, 11)}`;
      scene.id = elementId;
      frame.dataset.unicornReady = 'true';
      const config = {
        elementId,
        scale: Number(frame.dataset.unicornScale || 1),
        dpi: Number(frame.dataset.unicornDpi || 1.5),
        lazyLoad: false,
        production: true,
        altText: 'Shader scene',
        ariaLabel: 'Shader scene',
      };
      const inlineFilePath = createInlineSceneUrl(frame);
      if(inlineFilePath || frame.dataset.unicornJsonFilePath){
        config.filePath = inlineFilePath || frame.dataset.unicornJsonFilePath;
      } else {
        config.projectId = frame.dataset.unicornProjectId;
      }
      return window.UnicornStudio.addScene(config).then(sceneInstance => {
        frame.__unicornScene = sceneInstance;
      }).catch(error => {
        frame.removeAttribute('data-unicorn-ready');
        console.warn('[unicorn] failed to initialize scene', error);
      });
    }

    function resetFrame(frame){
      if(!frame) return;
      frame.__unicornScene?.destroy?.();
      frame.__unicornScene = null;
      frame.removeAttribute('data-unicorn-ready');
      const scene = frame.querySelector('.bt-unicorn-scene');
      if(scene){
        scene.innerHTML = '';
        scene.removeAttribute('id');
      }
    }

    function syncUnicornSceneActivity(activeSlide = getCurrentSlide()){
      document.querySelectorAll('.bt-unicorn-frame[data-unicorn-ready]').forEach(frame => {
        if(activeSlide && activeSlide.contains(frame)) return;
        resetFrame(frame);
      });
    }

    function refreshThemeAwareScenes(){
      document.querySelectorAll('.bt-unicorn-frame[data-unicorn-theme-color]').forEach(resetFrame);
      initUnicornScenes(getCurrentSlide());
    }

    function createInlineSceneUrl(frame){
      const jsonFilePath = frame.dataset.unicornJsonFilePath;
      if(!jsonFilePath) return '';
      window.__unicornSceneUrls ||= {};
      let sceneMap = {};
      try {
        sceneMap = JSON.parse(document.getElementById('unicorn-scene-json-map')?.textContent || '{}') || {};
      } catch {}
      const source = adaptThemeColor(sceneMap[jsonFilePath], frame);
      if(!source) return '';
      const cacheKey = frame.dataset.unicornThemeColor ? `${jsonFilePath}|${readThemeColor().join(',')}` : jsonFilePath;
      if(window.__unicornSceneUrls[cacheKey]) return window.__unicornSceneUrls[cacheKey];
      const blob = new Blob([source], {type:'application/json'});
      window.__unicornSceneUrls[cacheKey] = URL.createObjectURL(blob);
      return window.__unicornSceneUrls[cacheKey];
    }

    function adaptThemeColor(source, frame){
      if(!source || frame.dataset.unicornThemeColor !== 'focus') return source;
      const color = readThemeColor();
      return source.replace(
        /vec3\(0,\s*0\.5058823529411764,\s*0\.9686274509803922\)/g,
        `vec3(${color[0].toFixed(6)}, ${color[1].toFixed(6)}, ${color[2].toFixed(6)})`,
      );
    }

    function readThemeColor(){
      const style = getComputedStyle(document.documentElement);
      return parseCssColor(style.getPropertyValue('--theme-focus').trim())
        || parseCssColor(style.getPropertyValue('--focus-mark').trim())
        || [0, 0.505882, 0.968627];
    }

    function parseCssColor(value){
      const hex = value.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
      if(hex){
        const raw = hex[1].length === 3 ? hex[1].split('').map(x => x + x).join('') : hex[1];
        const n = parseInt(raw, 16);
        return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
      }
      const rgb = value.match(/^rgba?\(([^)]+)\)$/i);
      if(rgb){
        const parts = rgb[1].split(',').map(part => Number.parseFloat(part));
        if(parts.length >= 3 && parts.every(Number.isFinite)){
          return parts.slice(0, 3).map(part => Math.max(0, Math.min(255, part)) / 255);
        }
      }
      return null;
    }
  }

  function captureSlideImage(slideEl, options){
    const image = window.htmlToImage.toPng(slideEl, options);
    const timeout = new Promise((_, reject) => {
      setTimeout(() => reject(new Error('Slide image capture timed out')), 20000);
    });
    return Promise.race([image, timeout]);
  }

  function waitForUnicornFrames(scope, timeout = 6000){
    const frames = [...scope.querySelectorAll('.bt-unicorn-frame[data-unicorn-json-file-path],.bt-unicorn-frame[data-unicorn-project-id]')]
      .filter(frame => !frame.closest('.bt-image-slot.has-user-image,.bt-image-slot.has-user-media'));
    if(!frames.length) return Promise.resolve();
    const startedAt = performance.now();
    return new Promise(resolve => {
      const tick = () => {
        const ready = frames.every(frame => frame.dataset.unicornReady || frame.querySelector('canvas'));
        if(ready || performance.now() - startedAt > timeout) resolve();
        else requestAnimationFrame(tick);
      };
      tick();
    });
  }

  function loadExportScript(src, isReady){
    if(isReady()) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const existing = [...document.scripts].find(script => script.getAttribute('src') === src);
      const script = existing || document.createElement('script');
      const done = () => isReady() ? resolve() : reject(new Error(`${src} did not expose its browser API`));
      script.addEventListener('load', done, {once:true});
      script.addEventListener('error', () => reject(new Error(`${src} failed to load`)), {once:true});
      if(existing) setTimeout(done, 0);
      else {
        script.src = src;
        script.async = true;
        document.head.appendChild(script);
      }
    });
  }

  function restorePptxExportState(state){
    if(!state) return;
    go(state.index, {animate:false});
    document.body.classList.toggle('preview-panel-open', state.panelOpen);
    document.body.classList.toggle('overview-on', state.overviewOn);
    const overview = document.getElementById('overview');
    if(overview) overview.style.display = state.overviewDisplay;
    document.getElementById('preview-toggle')?.setAttribute('aria-expanded', state.panelOpen ? 'true' : 'false');
    window.__layoutDeck?.();
  }

  function getCaptureBackground(slide){
    const value = getComputedStyle(slide).backgroundColor;
    return value && value !== 'rgba(0, 0, 0, 0)' ? value : getComputedStyle(document.documentElement).getPropertyValue('--paper').trim() || '#fff';
  }

  function nextFrame(){
    return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
  }

  function getDeckFileName(){
    return (document.title || 'presentation')
      .replace(/[\\/:*?"<>|]+/g, '')
      .replace(/\s+/g, '-')
      .trim() || 'presentation';
  }

  function initSlots(){
    document.querySelectorAll(MEDIA_SLOT_SELECTOR).forEach((slot, index) => {
      const id = slot.dataset.mediaSlot || slot.dataset.imageSlot || `media-slot-${index + 1}`;
      slot.dataset.mediaSlot = id;
      slot.dataset.imageSlot = id;
      slot.dataset.mediaKind = 'image-video';
      slot.setAttribute('role', 'button');
      if(!slot.hasAttribute('tabindex')) slot.tabIndex = 0;
      slot.setAttribute('aria-label', '替换图片或视频');
      slot.setAttribute('title', '点击或拖拽替换图片或视频');
    });
    updateMediaSlotRatios();
  }

  function updateMediaSlotRatios(){
    document.querySelectorAll(MEDIA_SLOT_SELECTOR).forEach(slot => {
      const rect = slot.getBoundingClientRect();
      if(rect.width <= 0 || rect.height <= 0) return;
      const ratio = closestRatio(rect.width / rect.height);
      slot.dataset.mediaRatio = `${ratio[0]}:${ratio[1]}`;
      slot.dataset.mediaRatioLabel = `Media · ${ratio[0]}:${ratio[1]}`;
    });
  }

  function closestRatio(value){
    const [best] = COMMON_MEDIA_RATIOS
      .map(([w, h]) => ({ratio: [w, h], delta: Math.abs((w / h) - value)}))
      .sort((a, b) => a.delta - b.delta);
    if(best && best.delta / value < 0.035) return best.ratio;
    return approximateRatio(value);
  }

  function approximateRatio(value){
    let best = {ratio: [1, 1], delta: Infinity};
    for(let h = 1; h <= 24; h += 1){
      const w = Math.max(1, Math.round(value * h));
      const delta = Math.abs((w / h) - value);
      if(delta < best.delta) best = {ratio: [w, h], delta};
    }
    return best.ratio;
  }

  function readMediaState(){
    try {
      return JSON.parse(stateEl.textContent || '{}') || {};
    } catch {
      return {};
    }
  }

  function writeMediaState(){
    stateEl.textContent = safeJson(mediaState);
    try {
      window.__deckViewModel?.setMediaState?.(mediaState);
    } catch (error) {
      console.warn('[media] state was applied but could not be persisted', error);
    }
  }

  function safeJson(data){
    return JSON.stringify(data).replace(/</g, '\\u003c');
  }

  function getSlotId(slot){
    return slot.dataset.mediaSlot || slot.dataset.imageSlot;
  }

  function applyAllMedia(){
    document.querySelectorAll(MEDIA_SLOT_SELECTOR).forEach(slot => {
      const record = mediaState[getSlotId(slot)];
      if(record?.src) applyMedia(slot, record);
    });
  }

  function applyMedia(slot, record){
    const isVideo = record.kind === 'video' || (record.type || '').startsWith('video/') || /^data:video\//.test(record.src || '') || VIDEO_FILE_RE.test(record.name || '');
    slot.querySelectorAll(':scope > .bt-user-media,:scope > .bt-user-image').forEach(item => item.remove());
    const media = document.createElement(isVideo ? 'video' : 'img');
    media.className = `bt-user-media ${isVideo ? 'bt-user-video' : 'bt-user-image'}`;
    if(isVideo){
      media.muted = true;
      media.loop = true;
      media.playsInline = true;
      media.setAttribute('playsinline', '');
    } else {
      media.alt = '';
      media.draggable = false;
    }
    media.src = record.src;
    slot.appendChild(media);
    slot.classList.toggle('has-user-image', !isVideo);
    slot.classList.toggle('has-user-video', isVideo);
    slot.classList.add('has-user-media');
    slot.dataset.imageName = record.name || '';
    slot.dataset.mediaName = record.name || '';
    slot.dataset.mediaType = record.type || (isVideo ? 'video' : 'image');
    window.__syncActiveEffects?.();
  }
})();
</script>
<script>
/* =============== Text State =============== */
(function(){
  const deck = document.getElementById('deck');
  if(!deck) return;
  const stateEl = document.getElementById('embedded-text-state');
  const textState = readTextState();
  const textCounters = new Map();

  window.__initEditableText = scope => applyTextState(scope);
  window.__flushEditableTextState = () => {};
  applyTextState(deck);

  function applyTextState(scope = deck){
    prepareTextElements(scope);
  }

  function prepareTextElements(scope = deck){
    const root = scope instanceof Element ? scope : deck;
    const candidates = [
      ...(isTextCandidate(root) ? [root] : []),
      ...root.querySelectorAll('*'),
    ];
    candidates.forEach(el => {
      if(el !== root && !root.contains(el)) return;
      if(el !== root && el.parentElement?.closest('[data-editable-id]')) return;
      if(!el.dataset.editableId && !isTextCandidate(el)) return;
      if(!el.dataset.editableId) el.dataset.editableId = nextTextId(el);
      const synced = el.dataset.syncText ? textState[`sync:${el.dataset.syncText}`] : undefined;
      if(synced !== undefined) el.innerHTML = synced;
      else if(textState[el.dataset.editableId] !== undefined) el.innerHTML = textState[el.dataset.editableId];
    });
  }

  function nextTextId(el){
    const slide = el.closest('.slide');
    const slideKey = slide?.dataset.vmSlideKey || slide?.dataset.vmLayout || slide?.dataset.vmSlideId || 'deck';
    const count = (textCounters.get(slideKey) || 0) + 1;
    textCounters.set(slideKey, count);
    return `text:${slideKey}:${count}`;
  }

  function readTextState(){
    try {
      return JSON.parse(stateEl?.textContent || '{}') || {};
    } catch {
      return {};
    }
  }

  function isTextCandidate(el){
    if(!(el instanceof HTMLElement)) return false;
    if(el.hasAttribute('data-editable-skip')) return false;
    if(el.parentElement?.closest('[data-editable-id]')) return false;
    if(el.closest('.bt-image-slot,.bt-unicorn-frame,.bt-shader-backdrop,#nav,#preview-panel,#preview-toggle')) return false;
    if(['SCRIPT','STYLE','CANVAS','SVG','PATH','BUTTON','INPUT','SELECT','TEXTAREA','VIDEO','IMG'].includes(el.tagName)) return false;
    if(!el.textContent?.trim()) return false;
    return [...el.children].every(child => ['BR','SPAN','B','I','EM','STRONG','SMALL'].includes(child.tagName));
  }
})();
</script>
